<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- title -->
  <text x="600" y="56" text-anchor="middle" font-size="34" font-weight="700" fill="#0f172a">A Trustworthy Agent Loop for a Physical Lab</text>
  <text x="600" y="90" text-anchor="middle" font-size="18" fill="#64748b">the perceive–decide–act–record loop — run unattended, with honest status per step</text>

  <!-- clockwise flow arrows (between node boxes) -->
  <line x1="705" y1="250" x2="838" y2="296" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="838" y1="394" x2="705" y2="440" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="495" y1="440" x2="362" y2="394" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="362" y1="296" x2="495" y2="250" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- center: repeat-until-converged -->
  <path d="M600 283 A 62 62 0 1 1 594 283" fill="none" stroke="#cbd5e1" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="600" y="340" text-anchor="middle" font-size="15" font-weight="600" fill="#64748b">repeat until</text>
  <text x="600" y="360" text-anchor="middle" font-size="15" font-weight="600" fill="#64748b">converged</text>

  <!-- PERCEIVE (building) -->
  <rect x="483" y="148" width="234" height="104" rx="14" fill="#ffffff" stroke="#d97706" stroke-width="2.5"/>
  <text x="600" y="182" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">perceive</text>
  <text x="600" y="205" text-anchor="middle" font-size="14" fill="#475569">vision reads the dye signal</text>
  <rect x="552" y="216" width="96" height="22" rx="11" fill="#fef3c7"/>
  <text x="600" y="231" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">building</text>

  <!-- DECIDE (the core build — not yet) -->
  <rect x="833" y="293" width="234" height="104" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="3" stroke-dasharray="7 5"/>
  <text x="950" y="327" text-anchor="middle" font-size="24" font-weight="700" fill="#312e81">decide</text>
  <text x="950" y="350" text-anchor="middle" font-size="14" fill="#4338ca">agent picks the next volumes</text>
  <rect x="845" y="361" width="210" height="22" rx="11" fill="#e0e7ff"/>
  <text x="950" y="376" text-anchor="middle" font-size="12" font-weight="600" fill="#3730a3">the core build — not yet</text>

  <!-- ACT (shipped) -->
  <rect x="483" y="438" width="234" height="104" rx="14" fill="#ffffff" stroke="#16a34a" stroke-width="2.5"/>
  <text x="600" y="472" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">act</text>
  <text x="600" y="495" text-anchor="middle" font-size="14" fill="#475569">gantry pipettes the volumes</text>
  <rect x="554" y="506" width="92" height="22" rx="11" fill="#dcfce7"/>
  <text x="600" y="521" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">shipped</text>

  <!-- RECORD (building) -->
  <rect x="133" y="293" width="234" height="104" rx="14" fill="#ffffff" stroke="#d97706" stroke-width="2.5"/>
  <text x="250" y="327" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">record</text>
  <text x="250" y="350" text-anchor="middle" font-size="14" fill="#475569">stream to eLabFTW notebook</text>
  <rect x="202" y="361" width="96" height="22" rx="11" fill="#fef3c7"/>
  <text x="250" y="376" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">building</text>

  <!-- legend -->
  <rect x="300" y="575" width="18" height="18" rx="4" fill="#16a34a"/>
  <text x="326" y="589" font-size="14" fill="#475569">shipped</text>
  <rect x="452" y="575" width="18" height="18" rx="4" fill="#d97706"/>
  <text x="478" y="589" font-size="14" fill="#475569">building</text>
  <rect x="604" y="575" width="18" height="18" rx="4" fill="#eef2ff" stroke="#4f46e5" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="630" y="589" font-size="14" fill="#475569">the core build — not built yet</text>

  <!-- brand -->
  <text x="1166" y="612" text-anchor="end" font-size="13" fill="#cbd5e1">qte77.github.io</text>
</svg>
