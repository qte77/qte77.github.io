<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b8a878"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- title -->
  <text x="600" y="52" text-anchor="middle" font-size="34" font-weight="700" fill="#2c2818">An Open Agentic Coding Harness</text>
  <text x="600" y="86" text-anchor="middle" font-size="17" fill="#6b6040">five repos, one Claude Code loop — built Jan–Apr 2026</text>

  <!-- arrows (satellite to hub) -->
  <line x1="390" y1="232" x2="446" y2="300" stroke="#b8a878" stroke-width="2.5" marker-end="url(#ah)"/>
  <line x1="810" y1="232" x2="754" y2="300" stroke="#b8a878" stroke-width="2.5" marker-end="url(#ah)"/>
  <line x1="810" y1="470" x2="754" y2="402" stroke="#b8a878" stroke-width="2.5" marker-end="url(#ah)"/>
  <line x1="390" y1="470" x2="446" y2="402" stroke="#b8a878" stroke-width="2.5" marker-start="url(#ah)" marker-end="url(#ah)"/>

  <!-- arrow labels -->
  <text x="402" y="252" text-anchor="middle" font-size="12" font-weight="600" fill="#787010">skills</text>
  <text x="798" y="252" text-anchor="middle" font-size="12" font-weight="600" fill="#587818">voice + vision</text>
  <text x="800" y="452" text-anchor="middle" font-size="12" font-weight="600" fill="#983828">agent teams</text>
  <text x="398" y="452" text-anchor="middle" font-size="12" font-weight="600" fill="#4a6818">grades + feedback</text>

  <!-- HUB: the loop -->
  <rect x="450" y="288" width="300" height="124" rx="16" fill="#fff3d6" stroke="#7a6010" stroke-width="3"/>
  <text x="600" y="334" text-anchor="middle" font-size="26" font-weight="700" fill="#5a4810">Ralph Loop</text>
  <text x="600" y="359" text-anchor="middle" font-size="13" fill="#6b6040">autonomous TDD loop · git worktrees</text>
  <text x="600" y="385" text-anchor="middle" font-size="11.5" fill="#8a7848">ralph-loop-template · Jan 2026</text>

  <!-- PLUGINS (top-left) -->
  <rect x="100" y="145" width="290" height="104" rx="14" fill="#ffffff" stroke="#787010" stroke-width="2.5"/>
  <text x="245" y="184" text-anchor="middle" font-size="20" font-weight="700" fill="#2c2818">Plugins</text>
  <text x="245" y="206" text-anchor="middle" font-size="12" fill="#787010">claude-code-plugins · 60 skills</text>
  <text x="245" y="227" text-anchor="middle" font-size="11.5" fill="#6b6040">Feb 2026</text>

  <!-- SENSES (top-right) -->
  <rect x="810" y="145" width="290" height="104" rx="14" fill="#ffffff" stroke="#587818" stroke-width="2.5"/>
  <text x="955" y="184" text-anchor="middle" font-size="20" font-weight="700" fill="#2c2818">Senses</text>
  <text x="955" y="206" text-anchor="middle" font-size="12" fill="#587818">cc-senses · local TTS/STT/VLM</text>
  <text x="955" y="227" text-anchor="middle" font-size="11.5" fill="#6b6040">Apr 2026</text>

  <!-- EVAL (bottom-left) -->
  <rect x="100" y="453" width="290" height="104" rx="14" fill="#ffffff" stroke="#4a6818" stroke-width="2.5"/>
  <text x="245" y="492" text-anchor="middle" font-size="20" font-weight="700" fill="#2c2818">Eval</text>
  <text x="245" y="514" text-anchor="middle" font-size="12" fill="#4a6818">coding-agent-eval · 5 agents</text>
  <text x="245" y="535" text-anchor="middle" font-size="11.5" fill="#6b6040">Mar 2026</text>

  <!-- RECURSION (bottom-right) -->
  <rect x="810" y="453" width="290" height="104" rx="14" fill="#ffffff" stroke="#983828" stroke-width="2.5"/>
  <text x="955" y="492" text-anchor="middle" font-size="20" font-weight="700" fill="#2c2818">Recursion</text>
  <text x="955" y="514" text-anchor="middle" font-size="12" fill="#983828">cc-recursive-team-mode</text>
  <text x="955" y="535" text-anchor="middle" font-size="11.5" fill="#6b6040">Mar 2026</text>

  <!-- brand -->
  <text x="1166" y="612" text-anchor="end" font-size="13" fill="#cfc6ac">qte77.github.io</text>
</svg>
