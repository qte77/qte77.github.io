# lychee config for qte77.github.io. Overrides the shared fallback pulled from
# qte77/.github. CI scans raw **/*.md (not the built _site), so unrendered
# Jekyll Liquid and root-relative links cannot resolve here; several old posts
# also link to since-removed third-party pages. Exclusions are grouped below.
# Tracked in issue #30 (repoint / remove the real dead links in content).

# Treat auth / anti-bot / rate-limit walls as success rather than breakage.
accept = [200, 206, 401, 402, 403, 429]

exclude = [
  # --- Raw-markdown scan artifacts (resolve fine on the built site) ---
  "%7B%7B",                                    # unrendered Jekyll Liquid, e.g. {{ site.baseurl }}
  "feed\\.xml",                                # root-relative; generated by jekyll-feed
  "sitemap\\.xml",                             # root-relative; generated by jekyll-sitemap

  # --- Flaky / anti-bot / transient external hosts ---
  "smolagents\\.org",
  "windsurfai\\.org",
  "featuretools\\.com",
  "builder\\.ai",
  "papescape\\.org",

  # --- Content typos in old posts (real reader-facing; fix in content, #30) ---
  "colabl\\.research\\.google\\.com",          # s/colabl/colab in 2024-05-27-ML-Tooling
  "figma\\.com/ai",                            # missing https:// in 2025-02-07-ai-coding-tools-list
  "zed\\.dev/ai",                              # missing https:// in 2025-02-07-ai-coding-tools-list

  # --- Dead third-party links in 2024-2025 posts (repoint/remove, #30) ---
  "huggingface\\.co/datasets/scene_parse_150",
  "qte77/SegFormerQuantization",
  "NVIDIA/apex",
  "pytorch\\.org/cppdocs",
  "aws\\.amazon\\.com/machine-learning/automl",

  # --- qte77 self-links / assets to repoint (renamed repos / moved files, #30) ---
  "Agents-eval/blob/main/docs/papers/further_reading",
  "agentbeats\\.dev/qte77/graphjudge",
  "RDI-AgentX-AgentBeats-Competition",
  "RDI-AgentX-Architecture-light",
]
